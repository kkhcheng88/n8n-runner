---
services:
  runner:
    image: n8nio/runners:2.17.8
    restart: always
    env_file: n8n.env
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_STDLIB_ALLOW=*
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json
    depends_on:
      - n8n

volumes:
  n8n_storage: